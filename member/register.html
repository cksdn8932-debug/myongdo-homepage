<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - 명도복지관</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=3">
  <style>
    /* 📝 회원가입 폼 전용 스타일 */
    .member-form-container { max-width: 500px; margin: 40px auto; padding: 40px 30px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .form-title { font-size: 22px; color: #1e293b; font-weight: 700; text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #475569; font-size: 14px; }
    .form-control { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    .form-control:focus { border-color: #0284c7; outline: none; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15); }
    
    .btn-register { width: 100%; padding: 14px; background-color: #0284c7; color: #ffffff; border: none; border-radius: 4px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 15px; }
    .btn-register:hover { background-color: #0369a1; }
    .cancel-link { display: block; text-align: center; margin-top: 15px; font-size: 14px; color: #64748b; text-decoration: none; }
    .cancel-link:hover { text-decoration: underline; }
  </style>
</head>
<>

  <!-- ===== TOP BAR ===== -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <span>전남광주통합특별시 목포시 산정로 199번길 25</span>
      </div>
      <div class="topbar-right">
        <a href="login.html">로그인</a>
        <a href="register.html">회원가입</a>
      </div>
    </div>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <a href="../index.html">
          <span class="org-label">사회복지법인 성골롬반복지재단</span>
          <span class="site-name">명도복지관</span>
        </a>
      </div>
    </div>
  </header>

  <!-- ===== SUB HERO BANNER ===== -->
  <section class="sub-hero">
    <div class="sub-hero-content">
      <h2>회원 서비스</h2>
      <p>안전한 보안 프로토콜을 통해 회원 정보를 관리합니다.</p>
    </div>
  </section>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="sub-wrap" style="background-color: #f8fafc; padding: 20px 10px;">
    <div class="member-form-container">
      <h3 class="form-title">일반 회원가입</h3>
      
      <form id="register-form">
        <div class="form-group">
          <label for="user-id">사용할 아이디</label>
          <input type="text" id="user-id" class="form-control" placeholder="영문, 숫자 조합 4~15자" required>
        </div>
        
        <div class="form-group">
          <label for="user-pw">비밀번호</label>
          <input type="password" id="user-pw" class="form-control" placeholder="8자리 이상 입력해주세요." required>
        </div>

        <div class="form-group">
          <label for="user-name">성명 (실명)</label>
          <input type="text" id="user-name" class="form-control" placeholder="이름을 입력해주세요." required>
        </div>

        <div class="form-group">
          <label for="user-email">이메일 주소</label>
          <input type="email" id="user-email" class="form-control" placeholder="example@mail.com" required>
        </div>
        
        <button type="submit" class="btn-register">회원가입 신청</button>
        <a href="login.html" class="cancel-link">이미 계정이 있으신가요? 로그인하기</a>
      </form>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner" style="text-align: center; color: #64748b; font-size: 13px; padding: 20px 0;">
      <p>Copyright © 2026. Myongdo Welfare Center. All rights reserved.</p>
    </div>
  </footer>

  <!-- 💡 자바스크립트 동작 코드가 닫히는 body 태그 바로 위에 안전하게 위치합니다 -->
  <script>
    document.getElementById("register-form").addEventListener("submit", function(e) {
      e.preventDefault(); // 버튼 클릭 시 새로고침 방지

      const userId = document.getElementById("user-id").value;
      const userPw = document.getElementById("user-pw").value;
      const userName = document.getElementById("user-name").value;
      const userEmail = document.getElementById("user-email").value;

      // 동작 확인용 테스트 알림창
      alert(`[회원가입 요청 테스트]\n아이디: ${userId}\n이름: ${userName}\n이메일: ${userEmail}\n\n화면이 성공적으로 반응합니다!`);
      
      // 확인을 누르면 로그인 페이지로 자동 이동
      window.location.href = "login.html";
    });
  </script>

<!-- [4단계] 백엔드 서버와 통신하는 회원가입 스크립트 -->
  <script>
    document.getElementById("register-form").addEventListener("submit", async function(e) {
      e.preventDefault();

      // 1. 입력창 데이터 가져오기
      const userId = document.getElementById("user-id").value;
      const userPw = document.getElementById("user-pw").value;
      const userName = document.getElementById("user-name").value;
      const userEmail = document.getElementById("user-email").value;

      // 2. 백엔드 서버(Node.js)로 데이터 전송 (fetch API)
      try {
        const response = await fetch("http://localhost:3000/api/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId: userId,
            userPw: userPw,
            userName: userName,
            userEmail: userEmail
          })
        });

        const result = await response.json();

        if (result.success) {
          alert("🎉 회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.");
          window.location.href = "login.html"; // 로그인 화면으로 이동
        } else {
          alert(`❌ 회원가입 실패: ${result.message}`);
        }
      } catch (error) {
        console.error("서버 통신 오류:", error);
        alert("❌ 백엔드 서버와 연결할 수 없습니다. server.js가 켜져 있는지 확인해 주세요!");
      }
    });
  </script>
</body>
</html>
